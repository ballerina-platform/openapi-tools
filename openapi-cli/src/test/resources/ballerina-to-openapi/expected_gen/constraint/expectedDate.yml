openapi: 3.0.1
info:
  title: Api
  version: 0.0.0
servers:
  - url: "{server}:{port}/api"
    variables:
      server:
        default: http://localhost
      port:
        default: "8080"
paths:
  /users:
    post:
      operationId: postUsers
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfile'
        required: true
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
        "500":
          description: Server Error
components:
  schemas:
    UserProfile:
      required:
        - dateOfBirth
        - name
      type: object
      properties:
        name:
          type: string
        dateOfBirth:
          type: string
          format: date