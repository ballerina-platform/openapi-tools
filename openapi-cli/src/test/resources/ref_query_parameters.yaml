openapi: 3.1.0
info:
  title: RefParamTest
  version: 0.0.0
servers:
  - url: "http://localhost:8080"
paths:
  /albums/{id}:
    get:
      operationId: Get_Albums_Id
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/AlbumIdParam'
        - $ref: '#/components/parameters/HeaderParam'
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: object
components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    AlbumIdParam:
      name: albumId
      in: query
      required: false
      schema:
        type: string
    HeaderParam:
      name: X-HEADER
      in: header
      required: false
      schema:
        type: string
